<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha | AI Smart Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; 
        }
        .container { 
            width: 450px; height: 600px; background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .header { 
            padding: 25px; background: rgba(255, 255, 255, 0.05); color: #00d2ff;
            text-align: center; font-size: 22px; font-weight: 600; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header span { color: #fff; font-size: 14px; display: block; font-weight: 300; opacity: 0.8; }
        
        #chat-box { 
            flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; 
        }
        /* Custom Scrollbar */
        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .bubble { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: #00d2ff; color: #fff; border-bottom-right-radius: 2px; }
        .bot { align-self: flex-start; background: rgba(255, 255, 255, 0.2); color: #fff; border-bottom-left-radius: 2px; }

        .input-group { padding: 20px; background: rgba(0,0,0,0.2); display: flex; gap: 10px; }
        input { 
            flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 10px; padding: 12px; color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #00d2ff; background: rgba(255,255,255,0.05); }
        button { 
            background: #00d2ff; border: none; color: white; padding: 0 20px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        button:hover { background: #3a7bd5; transform: scale(1.05); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            CodeAlpha AI
            <span>Smart Support Assistant</span>
        </div>
        <div id="chat-box">
            <div class="bubble bot">Welcome! I am the CodeAlpha Intelligence Bot. Ask me anything about AI or your internship!</div>
        </div>
        <div class="input-group">
            <input type="text" id="user-input" placeholder="Ask a professional question...">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById("user-input");
            const box = document.getElementById("chat-box");
            const val = input.value.trim();
            if(!val) return;

            // Add User Message
            box.innerHTML += `<div class="bubble user">${val}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: val})
            })
            .then(res => res.json())
            .then(data => {
                // Add Bot Message
                box.innerHTML += `<div class="bubble bot">${data.answer}</div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
        // Allow "Enter" key to send
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") send();
        });
    </script>
</body>
</html>
